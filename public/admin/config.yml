backend:
  name: github
  repo: Thevent26/gizmogear
  branch: main
  base_url: https://gizmogear.vercel.app
  auth_endpoint: api/auth/callback
  commit_messages:
    create: 'Create {{collection}} "{{slug}}"'
    update: 'Update {{collection}} "{{slug}}"'
    delete: 'Delete {{collection}} "{{slug}}"'
    uploadMedia: 'Upload "{{path}}"'
    deleteMedia: 'Delete "{{path}}"'

media_folder: public/images/uploads
public_folder: /images/uploads

collections:
  - name: 'posts'
    label: 'Blog Posts'
    folder: 'content/posts'
    create: true
    delete: true
    slug: '{{slug}}'
    fields:
      - { label: 'Title', name: 'title', widget: 'string' }
      - { label: 'Publish Date', name: 'date', widget: 'datetime', format: 'YYYY-MM-DD' }
      - { label: 'Author', name: 'author', widget: 'string', default: 'Joetech' }
      - { label: 'Category', name: 'category', widget: 'string' }
      - { label: 'Excerpt', name: 'excerpt', widget: 'text' }
      - { label: 'Cover Image', name: 'coverImage', widget: 'image', required: false }
      - { label: 'Tags', name: 'tags', widget: 'list', required: false }
      - { label: 'Body', name: 'body', widget: 'markdown' }
      - { label: 'Featured', name: 'featured', widget: 'boolean', default: false, required: false }

  - name: 'pages'
    label: 'Pages'
    folder: 'content/pages'
    create: true
    delete: true
    slug: '{{slug}}'
    fields:
      - { label: 'Title', name: 'title', widget: 'string' }
      - { label: 'Body', name: 'body', widget: 'markdown' }
